name: PR validate
# 在 PR 上實際建置 image + 驗證 compose，作為 Renovate auto-merge 的合併閘門。
# 刻意不加 paths 過濾：branch protection 的 required check 必須在「每個」PR 上都回報，
# 否則 compose-only / workflow-only 的 PR 會因為沒有檢查結果而永遠卡在 auto-merge。
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Validate compose.yml
        env:
          APP_UID: "1000"
          APP_GID: "1000"
          CODE_PASSWORD: dummy
          CF_TUNNEL_TOKEN: dummy
        run: docker compose config > /dev/null && echo "compose config OK"

      # 實際建置（amd64、不推送）——抓得到 base image 等依賴更新造成的 build 破壞。
      # 重用 main 上 build.yml 的 GHA cache 以加速；arm64 仍由合併後的 build.yml 驗證。
      - name: Build image (amd64, no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=linux-amd64
          cache-to: type=gha,mode=max,scope=pr-validate
